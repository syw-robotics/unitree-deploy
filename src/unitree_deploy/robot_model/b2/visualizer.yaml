lowstate_topic: rt/lowstate
odom_topic: rt/odommodestate
use_odom: true

base_joint: floating_base_joint
initial_base:
  pos: [0.0, 0.0, 0.8]
  quat: [1.0, 0.0, 0.0, 0.0]

# Dedicated to the sim2sim MuJoCo viewer initial camera.
viewer:
  camera:
    lookat: [0.0, 0.0, 0.85]
    distance: 2.0
    elevation: -15.0
    azimuth: 20.0
    track_body: base_link
    track_offset: [0.0, 0.0, 0.0]

# Order of LowState.motor_state for Unitree quadrupeds.
state_joint_names:
  - FR_hip_joint
  - FR_thigh_joint
  - FR_calf_joint
  - FL_hip_joint
  - FL_thigh_joint
  - FL_calf_joint
  - RR_hip_joint
  - RR_thigh_joint
  - RR_calf_joint
  - RL_hip_joint
  - RL_thigh_joint
  - RL_calf_joint

enable_cameras: false
show_camera_frustums: true
cameras: []
