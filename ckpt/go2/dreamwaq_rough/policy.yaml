#
# LocoLab DreamWaQ Rough Terrain Locomotion Policy
#

policy_path: "policy.onnx"

step_dt: 0.02
physics_dt: 0.002
decimation: 10

obs_joint_order: [
  'FR_hip_joint', 'FR_thigh_joint', 'FR_calf_joint', 
  'FL_hip_joint', 'FL_thigh_joint', 'FL_calf_joint', 
  'RR_hip_joint', 'RR_thigh_joint', 'RR_calf_joint', 
  'RL_hip_joint', 'RL_thigh_joint', 'RL_calf_joint', 

]

sdk_joint_order: [
  'FR_hip_joint', 'FR_thigh_joint', 'FR_calf_joint', 
  'FL_hip_joint', 'FL_thigh_joint', 'FL_calf_joint', 
  'RR_hip_joint', 'RR_thigh_joint', 'RR_calf_joint', 
  'RL_hip_joint', 'RL_thigh_joint', 'RL_calf_joint', 

]

default_qpos: [
  # FR
  -0.1, 0.8, -1.5,
  # FL
  -0.1, 0.8, -1.5,
  # RR
  0.1, 1.0, -1.5,
  # RL
  0.1, 1.0, -1.5,
]

policy_input_name: "policy"
policy_output_name: "action"

observations:
  - type: command
    history_len: 5
    command_range:
      - [-0.35, 0.35]  # lin_vel_x
      - [-0.4, 0.4]  # lin_vel_y
      - [-0.75, 0.75]  # ang_vel_yaw
  - type: base_ang_vel
    history_len: 5
  - type: projected_gravity
    history_len: 5
  - type: joint_pos
    history_len: 5
  - type: joint_vel
    history_len: 5
  - type: prev_action
    history_len: 5

action_dim: 12
action_clip: 10.0
action_joint_order: [
  'FR_hip_joint', 'FR_thigh_joint', 'FR_calf_joint',
  'FL_hip_joint', 'FL_thigh_joint', 'FL_calf_joint',
  'RR_hip_joint', 'RR_thigh_joint', 'RR_calf_joint',
  'RL_hip_joint', 'RL_thigh_joint', 'RL_calf_joint',
]
action_scale: [
  # FR
  0.125, 0.25, 0.25,
  # FL
  0.125, 0.25, 0.25,
  # RR
  0.125, 0.25, 0.25,
  # RL
  0.125, 0.25, 0.25,
]

kps_real: [
  # FR
  25.0, 25.0, 25.0,
  # FL
  25.0, 25.0, 25.0,
  # RR
  25.0, 25.0, 25.0,
  # RL
  25.0, 25.0, 25.0,
]

kds_real: [
  # FR
  0.5, 0.5, 0.5,
  # FL
  0.5, 0.5, 0.5,
  # RR
  0.5, 0.5, 0.5,
  # RL
  0.5, 0.5, 0.5,
]
