lowstate_topic: rt/lowstate
odom_topic: rt/odommodestate
use_odom: true

base_joint: floating_base_joint
initial_base:
  pos: [0.0, 0.0, 1.0]
  quat: [1.0, 0.0, 0.0, 0.0]

# Order of LowState.motor_state. For sim this matches MuJoCo actuator order;
# for real mode it should match the robot SDK motor order.
state_joint_names:
  - left_hip_pitch_joint
  - left_hip_roll_joint
  - left_hip_yaw_joint
  - left_knee_joint
  - left_ankle_pitch_joint
  - left_ankle_roll_joint
  - right_hip_pitch_joint
  - right_hip_roll_joint
  - right_hip_yaw_joint
  - right_knee_joint
  - right_ankle_pitch_joint
  - right_ankle_roll_joint
  - waist_yaw_joint
  - waist_roll_joint
  - waist_pitch_joint
  - left_shoulder_pitch_joint
  - left_shoulder_roll_joint
  - left_shoulder_yaw_joint
  - left_elbow_joint
  - left_wrist_roll_joint
  - left_wrist_pitch_joint
  - left_wrist_yaw_joint
  - right_shoulder_pitch_joint
  - right_shoulder_roll_joint
  - right_shoulder_yaw_joint
  - right_elbow_joint
  - right_wrist_roll_joint
  - right_wrist_pitch_joint
  - right_wrist_yaw_joint

enable_cameras: false
show_camera_frustums: true
cameras:
  - name: d435_head
    pose_camera_name: d435_head
    serial: "140122071098"
    width: 640
    height: 480
    fps: 30
    enable_depth: true
